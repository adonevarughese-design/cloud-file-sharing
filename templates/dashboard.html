<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>CloudShare Dashboard</h2>
    <p>Upload, download, and manage your files.</p>

    <a href="/admin" class="btn btn-warning btn-sm mb-3">Admin Panel</a>
    <a href="/logout" class="btn btn-danger btn-sm mb-3">Logout</a>

    <div class="card p-3 mb-4">
        <h4>Upload File</h4>

        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input class="form-control mb-3" type="file" name="file" required>
            <button class="btn btn-primary" type="submit">Upload</button>
        </form>
    </div>

    <div class="card p-3">
        <h4>Uploaded Files</h4>

        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>File Name</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for file in files %}
                <tr>
                    <td>{{ file.filename }}</td>
                    <td>
                        <a class="btn btn-success btn-sm" href="/download/{{ file.filename }}">Download</a>
                        <a class="btn btn-danger btn-sm" href="/delete/{{ file.id }}">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
