<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShare - Login</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#dfe9f7;
        }

        .container{
            width:100%;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        h1{
            color:#2563eb;
            font-size:60px;
            margin-bottom:40px;
        }

        .card{
            background:white;
            width:380px;
            padding:40px;
            border-radius:18px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:linear-gradient(to right,#2563eb,#06b6d4);
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        .link{
            margin-top:20px;
            text-align:center;
        }

        a{
            text-decoration:none;
            color:#2563eb;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>CloudShare</h1>

    <div class="card">

        <h2>Login</h2>

        <form action="/login" method="POST">

            <input type="email" name="email" placeholder="Email" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <div class="link">
            <a href="/register">Create Account</a>
        </div>

    </div>

</div>

</body>
</html>
